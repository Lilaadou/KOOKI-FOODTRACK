<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KOOKI — Traçabilité</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d44218">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kooki">
  <link rel="apple-touch-icon" href="logo.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#f7f8fa;color:#1a1a2e;display:flex;min-height:100vh;}

    /* ── SIDEBAR ── */
    .sidebar{width:220px;background:#fff;border-right:1px solid #efefef;display:flex;flex-direction:column;padding:22px 0;position:fixed;height:100vh;overflow-y:auto;}
    .logo{display:flex;align-items:center;justify-content:center;padding:0 20px 26px;}
    .nav-label{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.08em;padding:0 20px 6px;}
    .nav-item{display:flex;align-items:center;gap:11px;padding:10px 20px;font-size:13.5px;color:#666;cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;}
    .nav-item:hover{background:#fdf0ec;color:#d44218;}
    .nav-item.active{background:#fbe8e2;color:#d44218;font-weight:600;border-right:3px solid #d44218;}
    .nav-item.hidden{display:none;}
    .nav-icon{font-size:15px;width:18px;text-align:center;}
    .sidebar-bottom{margin-top:auto;border-top:1px solid #efefef;padding-top:10px;}

    /* ── MAIN ── */
    .main{margin-left:220px;flex:1;padding:22px 28px;}

    /* ── TOPBAR ── */
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
    .topbar h1{font-size:19px;font-weight:700;}
    .topbar-sub{font-size:12px;color:#888;margin-top:2px;}
    .topbar-right{display:flex;align-items:center;gap:10px;position:relative;}

    /* SEARCH */
    .search-wrap{position:relative;}
    .search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #efefef;border-radius:10px;padding:7px 12px;font-size:13px;color:#888;width:220px;cursor:text;transition:border-color .15s;}
    .search-bar:focus-within{border-color:#d44218;}
    .search-bar input{border:none;outline:none;background:transparent;font-size:13px;color:#1a1a2e;width:100%;}
    .search-bar input::placeholder{color:#bbb;}
    .search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid #efefef;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:200;display:none;max-height:320px;overflow-y:auto;}
    .search-results.open{display:block;}
    .search-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5;transition:background .12s;}
    .search-item:last-child{border-bottom:none;}
    .search-item:hover{background:#fdf0ec;}
    .search-item-title{font-size:13px;font-weight:600;}
    .search-item-sub{font-size:11px;color:#888;margin-top:2px;}
    .search-empty{padding:16px;text-align:center;color:#aaa;font-size:13px;}
    @keyframes search-highlight{0%{background:#fbe8e2;box-shadow:0 0 0 3px #d44218;}60%{background:#fbe8e2;}100%{background:transparent;box-shadow:none;}}
    .search-highlight{animation:search-highlight 1.8s ease forwards;border-radius:8px;}

    .bell{width:34px;height:34px;background:#fff;border:1px solid #efefef;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;position:relative;}
    .bell-dot{position:absolute;top:6px;right:7px;width:7px;height:7px;background:#d44218;border-radius:50%;border:1.5px solid #fff;}

    /* PROFILE */
    .profile-btn{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #efefef;border-radius:12px;padding:5px 11px 5px 5px;cursor:pointer;transition:border-color .15s;}
    .profile-btn:hover{border-color:#d44218;}
    .profile-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
    .profile-name{font-size:13px;font-weight:600;}
    .profile-arrow{font-size:10px;color:#aaa;}
    .profile-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid #efefef;border-radius:14px;padding:8px;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:600;display:none;max-height:80vh;overflow-y:auto;}
    .profile-dropdown.open{display:block;}
    .profile-dropdown-title{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.05em;padding:4px 8px 8px;}
    .profile-option{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .12s;}
    .profile-option:hover{background:#fbe8e2;}
    .profile-option.selected{background:#fbe8e2;}
    .p-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
    .p-info{flex:1;}
    .p-name{font-size:13px;font-weight:600;}
    .p-role{font-size:11px;color:#aaa;}

    /* ── PAGES ── */
    .page{display:none;}.page.active{display:block;}

    /* ── STAT CARDS ── */
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:18px;}
    .stat-card{background:#fff;border-radius:16px;padding:17px 19px;border:1px solid #f0f0f0;}
    .stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px;}
